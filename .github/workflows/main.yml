name: Main Orchestrator

on:
#  push:
#    branches: [ "main" ]
  # This adds the "Run workflow" button in GitHub Actions tab
  workflow_dispatch:
    inputs:
      project_directory:
        description: 'Path to Terraform code'
        required: true
        default: 'Project1'
        type: choice
        options:
          - Project1
          - Project2
      environment:
        description: 'Environment of the project'
        required: true
        default: 'dev'
        type: string

      aws_region:
        description: 'aws region where resources to be deployed'
        required: true
        default: ap-south-1
        type: choice
        options:
          - us-east-1
          - us-east-2
          - ap-south-1
          - eu-north-1


jobs:
  call-terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      # Logic: If manual trigger, use input. If push trigger, use default path.
      project_directory: ${{ github.event.inputs.project_directory }} #|| './Project1/iac_code/terraform/' }}
      aws_region: ${{ github.event.inputs.aws_region }}
      environment: ${{ github.event.inputs.environment }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_STATE_BUCKET: ${{ secrets.S3_STATE_BUCKET }}
      DYNAMODB_LOCK_TABLE: ${{ secrets.DYNAMODB_LOCK_TABLE }}
