name: 'Terraform Reusable Pipeline'

on:
  workflow_call:
    inputs:
      project_directory:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      environment:
        required: true
        type: string
        default: 'dev'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      S3_STATE_BUCKET:
        required: true
      DYNAMODB_LOCK_TABLE:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        # Matches your monorepo structure
        working-directory: "./${{ inputs.project_directory }}/iac_code/terraform"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # This is the critical step for dynamic state management
      - name: Terraform Init
        run: |
          # Convert project name to lowercase for consistent S3 paths
          PROJECT_LOWER=$(echo "${{ inputs.project_directory }}" | tr '[:upper:]' '[:lower:]')
          
          # Construct the dynamic key: e.g., dev/project1/tf.state
          STATE_KEY="${{ inputs.environment }}/${PROJECT_LOWER}/tf.state"
          
          echo "Initializing Terraform with S3 Key: $STATE_KEY"
          
          echo "Targeting Bucket: ${{ secrets.S3_STATE_BUCKET }}"
          echo "Targeting Key: $STATE_KEY"
          
          terraform init \
            -backend-config="bucket=${{ secrets.S3_STATE_BUCKET }}" \
            -backend-config="key=$STATE_KEY" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMODB_LOCK_TABLE }}"

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        #if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
